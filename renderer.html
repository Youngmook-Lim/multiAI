<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MultiAI</title>
<style>
  /* ============================================================
     MultiAI — UI shell (dark, developer-tool aesthetic)
     Plain HTML/CSS/vanilla JS. No build step, no framework.
     The four AI panes ALWAYS stay in the DOM. Hidden panes use
     display:none and are never removed (they hold live sessions).
     ============================================================ */

  :root {
    --bg:            #0c0d10;   /* app background behind everything */
    --chrome:        #141519;   /* header / prompt bar surface */
    --chrome-2:      #191b20;   /* raised controls */
    --border:        #25272e;   /* hairlines */
    --border-soft:   #1d1f25;
    --text:          #e7e8ea;
    --text-dim:      #9498a1;
    --text-faint:    #5b5f68;
    --focus:         #3a6df0;

    /* per-service accents */
    --c-chatgpt: #10a37f;
    --c-gemini:  #4285f4;
    --c-grok:    #9b8cff;
    --c-claude:  #d97757;

    /* status */
    --s-idle:    #4a4d55;
    --s-sending: #e3a008;
    --s-loaded:  #2ecc71;
    --s-error:   #ef4444;

    --r: 9px;
    --gap: 10px;
    --prompt-h: 0px; /* informational */
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    user-select: none;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ---------- Top chrome ---------- */
  .topbar {
    flex: 0 0 auto;
    height: 46px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 12px;
    background: var(--chrome);
    border-bottom: 1px solid var(--border);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    letter-spacing: .2px;
    font-size: 13px;
    color: var(--text);
    padding-right: 4px;
  }
  .brand .mark {
    width: 18px; height: 18px; border-radius: 5px;
    background:
      linear-gradient(135deg, var(--c-chatgpt) 0 50%, var(--c-gemini) 0) top left / 50% 50% no-repeat,
      linear-gradient(135deg, var(--c-grok) 0 50%, var(--c-claude) 0) bottom right / 50% 50% no-repeat;
    background-color: #000;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
  }
  .brand .sub {
    color: var(--text-faint);
    font-weight: 500;
    font-size: 11px;
  }

  /* segmented tab control — only meaningful in narrow layout */
  .tabs {
    display: none; /* shown by media query when narrow */
    flex: 1 1 auto;
    align-items: center;
    gap: 3px;
    padding: 3px;
    background: var(--chrome-2);
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    max-width: 460px;
  }
  .tab {
    flex: 1 1 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    height: 28px;
    border: 0;
    background: transparent;
    color: var(--text-dim);
    font: inherit;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .tab .dot8 { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .tab:hover { color: var(--text); background: rgba(255,255,255,.03); }
  .tab[aria-selected="true"] {
    color: var(--text);
    background: #23252c;
    box-shadow: inset 0 0 0 1px var(--border);
  }

  .spacer { flex: 1 1 auto; }

  .iconbtn {
    width: 30px; height: 30px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 7px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 0;
  }
  .iconbtn:hover { background: var(--chrome-2); color: var(--text); border-color: var(--border-soft); }
  .iconbtn:active { transform: translateY(.5px); }
  .iconbtn svg { width: 16px; height: 16px; display: block; }

  /* ---------- Grid of panes ---------- */
  .stage {
    flex: 1 1 auto;
    min-height: 0;
    padding: var(--gap);
    background: var(--bg);
  }
  .grid {
    height: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: var(--gap);
  }

  .pane {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    background: #101114;
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    position: relative;
  }
  .pane::before {
    /* accent hairline along the top edge */
    content: "";
    position: absolute; left: 0; right: 0; top: 0; height: 2px;
    background: var(--accent);
    opacity: .85;
    z-index: 2;
  }

  .pane-head {
    flex: 0 0 auto;
    height: 38px;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 0 8px 0 11px;
    background: var(--chrome);
    border-bottom: 1px solid var(--border);
  }
  .pane-name {
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 12.5px;
    color: var(--text);
  }
  .pane-name .swatch {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
  }

  /* status dot with 4 states */
  .status {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--s-idle);
    flex: 0 0 auto;
    transition: background .2s ease;
  }
  .status[data-status="idle"]    { background: var(--s-idle); }
  .status[data-status="sending"] { background: var(--s-sending); animation: pulse 1s ease-in-out infinite; }
  .status[data-status="loaded"]  { background: var(--s-loaded); }
  .status[data-status="error"]   { background: var(--s-error); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--s-sending) 60%, transparent); opacity: 1; }
    50%      { box-shadow: 0 0 0 5px color-mix(in srgb, var(--s-sending) 0%, transparent); opacity: .55; }
  }
  .status-label {
    font-size: 11px; color: var(--text-faint); font-weight: 500;
    text-transform: capitalize;
    min-width: 44px;
  }

  .pane-actions { margin-left: auto; display: flex; gap: 2px; }
  .pane-actions .iconbtn { width: 26px; height: 26px; }
  .pane-actions .iconbtn svg { width: 14px; height: 14px; }

  /* the placeholder / webview swap target */
  .pane-body {
    flex: 1 1 auto;
    min-height: 0;
    position: relative;
  }
  /* INTEGRATION: [data-pane] container — swap a <webview> in here.
     Visible placeholder styling lives on .placeholder below. */
  .placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    text-align: center;
    padding: 20px;
    color: var(--text-faint);
    background:
      repeating-linear-gradient(45deg,
        transparent 0 11px,
        color-mix(in srgb, var(--accent) 4%, transparent) 11px 12px),
      radial-gradient(120% 120% at 50% 0%, color-mix(in srgb, var(--accent) 7%, transparent), transparent 60%),
      #0b0c0f;
  }
  .placeholder .pg-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 13px;
    border: 1px dashed color-mix(in srgb, var(--accent) 55%, var(--border));
    border-radius: 100px;
    color: color-mix(in srgb, var(--accent) 85%, #fff);
    font-weight: 600; font-size: 12px;
    background: color-mix(in srgb, var(--accent) 10%, transparent);
  }
  .placeholder .pg-badge .swatch { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .placeholder .pg-title { color: var(--text-dim); font-size: 12.5px; font-weight: 600; }
  .placeholder code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    color: var(--text-faint);
    background: rgba(255,255,255,.03);
    border: 1px solid var(--border-soft);
    padding: 2px 6px; border-radius: 5px;
  }

  /* ---------- Expand (wide layout) ----------
     When an accordion pane is expanded it fills the whole grid;
     the others hide (display:none) but stay mounted. */
  .grid[data-expanded] .pane { display: none; }
  .grid[data-expanded="chatgpt"] .pane[data-pane="chatgpt"],
  .grid[data-expanded="gemini"]  .pane[data-pane="gemini"],
  .grid[data-expanded="grok"]    .pane[data-pane="grok"],
  .grid[data-expanded="claude"]  .pane[data-pane="claude"] {
    display: flex;
    grid-column: 1 / -1;
    grid-row: 1 / -1;
  }

  /* ---------- Narrow layout ----------
     When the WINDOW (not a device) is too narrow for a readable
     2×2 grid, show one pane at a time via the tab switcher.
     All four panes stay mounted; hidden ones use display:none. */
  @media (max-width: 880px) {
    .tabs { display: flex; }
    .brand .sub { display: none; }

    .grid { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    .grid .pane { display: none; }
    .grid[data-active="chatgpt"] .pane[data-pane="chatgpt"],
    .grid[data-active="gemini"]  .pane[data-pane="gemini"],
    .grid[data-active="grok"]    .pane[data-pane="grok"],
    .grid[data-active="claude"]  .pane[data-pane="claude"] {
      display: flex;
      grid-column: 1 / -1;
      grid-row: 1 / -1;
    }
    /* expand state is irrelevant in single-pane mode */
    .grid[data-expanded] .pane { display: none; }
    .grid[data-expanded][data-active="chatgpt"] .pane[data-pane="chatgpt"],
    .grid[data-expanded][data-active="gemini"]  .pane[data-pane="gemini"],
    .grid[data-expanded][data-active="grok"]    .pane[data-pane="grok"],
    .grid[data-expanded][data-active="claude"]  .pane[data-pane="claude"] {
      display: flex;
    }
    .pane-actions .iconbtn[data-act="expand"] { display: none; }
  }

  /* ---------- Bottom prompt bar (always full width, pinned) ---------- */
  .promptbar {
    flex: 0 0 auto;
    background: var(--chrome);
    border-top: 1px solid var(--border);
    padding: 10px 12px;
  }
  .composer {
    display: flex;
    align-items: flex-end;
    gap: 9px;
    max-width: 1400px;
    margin: 0 auto;
    background: var(--chrome-2);
    border: 1px solid var(--border);
    border-radius: 11px;
    padding: 8px 8px 8px 12px;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .composer.focused {
    border-color: color-mix(in srgb, var(--focus) 60%, var(--border));
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--focus) 16%, transparent);
  }
  .composer.flash {
    border-color: var(--s-loaded);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--s-loaded) 22%, transparent);
  }
  #prompt {
    flex: 1 1 auto;
    resize: none;
    border: 0;
    outline: 0;
    background: transparent;
    color: var(--text);
    font: inherit;
    line-height: 1.5;
    max-height: 180px;
    min-height: 22px;
    padding: 5px 0;
    overflow-y: auto;
    user-select: text;
  }
  #prompt::placeholder { color: var(--text-faint); }
  .composer-meta {
    display: flex; align-items: center; gap: 8px;
    padding-bottom: 2px;
  }
  .hint {
    font-size: 11px; color: var(--text-faint);
    white-space: nowrap;
  }
  .hint kbd {
    font-family: inherit;
    background: #23252c; border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 5px; color: var(--text-dim);
    font-size: 10.5px;
  }
  .send {
    flex: 0 0 auto;
    height: 34px;
    padding: 0 16px;
    display: inline-flex; align-items: center; gap: 7px;
    border: 0; border-radius: 8px;
    background: var(--focus);
    color: #fff; font: inherit; font-weight: 600;
    cursor: pointer;
  }
  .send:hover { background: color-mix(in srgb, var(--focus) 88%, #fff); }
  .send:disabled { background: #2a2d36; color: var(--text-faint); cursor: default; }
  .send svg { width: 15px; height: 15px; }
  .send .count {
    font-size: 11px; font-weight: 600; opacity: .8;
  }

  /* ---------- Settings drawer ---------- */
  .scrim {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    opacity: 0; pointer-events: none;
    transition: opacity .2s ease;
    z-index: 40;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }

  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 340px; max-width: 90vw;
    background: var(--chrome);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform .24s cubic-bezier(.4,0,.2,1);
    z-index: 50;
    display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    height: 46px; flex: 0 0 auto;
    display: flex; align-items: center;
    padding: 0 10px 0 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  .drawer-body { flex: 1 1 auto; overflow-y: auto; padding: 8px; }
  .svc {
    display: flex; align-items: center; gap: 11px;
    padding: 12px;
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    margin-bottom: 8px;
    background: var(--chrome-2);
  }
  .svc .swatch { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex: 0 0 auto; }
  .svc .svc-name { font-weight: 600; font-size: 13px; }
  .svc .svc-meta { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
  .svc .svc-main { flex: 1 1 auto; min-width: 0; }
  .svc .clear {
    border: 1px solid var(--border);
    background: transparent; color: var(--text-dim);
    font: inherit; font-size: 11px; font-weight: 500;
    padding: 5px 9px; border-radius: 7px; cursor: pointer;
  }
  .svc .clear:hover { color: var(--s-error); border-color: color-mix(in srgb, var(--s-error) 50%, var(--border)); }

  /* toggle switch */
  .switch { position: relative; width: 38px; height: 22px; flex: 0 0 auto; cursor: pointer; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .track {
    position: absolute; inset: 0; border-radius: 100px;
    background: #2c2f37; transition: background .18s ease;
  }
  .switch .knob {
    position: absolute; top: 3px; left: 3px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #c8cad0; transition: transform .18s ease;
  }
  .switch input:checked + .track { background: var(--accent); }
  .switch input:checked + .track + .knob { transform: translateX(16px); background: #fff; }

  .drawer-foot {
    flex: 0 0 auto; padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-faint);
  }
</style>
</head>
<body>
<div class="app">

  <!-- ===================== TOP CHROME ===================== -->
  <header class="topbar">
    <div class="brand">
      <span class="mark" aria-hidden="true"></span>
      <span>MultiAI</span>
      <span class="sub">· one prompt, four models</span>
    </div>

    <!-- Segmented tab switcher: only shown in narrow layout (CSS) -->
    <div class="tabs" id="tabs" role="tablist" aria-label="Active pane"></div>

    <div class="spacer"></div>

    <button class="iconbtn" id="gear" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- ===================== PANE GRID ===================== -->
  <!-- The grid carries two state attributes:
         data-active   → which pane shows in NARROW layout (tab switcher)
         data-expanded → which pane is expanded in WIDE layout (fills grid)
       Panes are NEVER removed from the DOM; hidden = display:none. -->
  <main class="stage">
    <div class="grid" id="grid" data-active="chatgpt">
      <!-- panes injected by JS so all four are identical & stay mounted -->
    </div>
  </main>

  <!-- ===================== PROMPT BAR ===================== -->
  <div class="promptbar">
    <div class="composer" id="composer">
      <textarea id="prompt" rows="1" placeholder="Message all four models…  (Enter to send · Shift+Enter for newline)" spellcheck="false"></textarea>
      <div class="composer-meta">
        <button class="send" id="send" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          <span>Send</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ===================== SETTINGS DRAWER ===================== -->
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-hidden="true" aria-label="Settings">
  <div class="drawer-head">
    <span>Settings</span>
    <button class="iconbtn" id="drawerClose" style="margin-left:auto" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="svcList">
    <!-- service rows injected by JS -->
  </div>
  <div class="drawer-foot">Toggles &amp; session controls are UI stubs — wire them via <code style="font-size:10.5px">window.onSettingsChange()</code>.</div>
</aside>

<script>
/* ============================================================
   MultiAI — UI shell logic (vanilla JS)

   ▼▼▼ INTEGRATION HOOKS — wire these from the Electron side ▼▼▼

   • Pane swap targets:
       Each pane has a body container with [data-pane="<id>"].
       Replace the .placeholder inside it with an Electron <webview>.
       Query:  document.querySelector('[data-pane="claude"]')

   • window.onPromptSubmit(text)
       Fires when the user sends. Default stub console.logs + clears input.

   • window.setPaneStatus(paneId, status)
       Drive the per-pane status dot. status ∈ idle|sending|loaded|error.

   • window.onPaneReload(paneId)      — reload button clicked
   • window.onPaneExpand(paneId)      — expand/collapse toggled (UI handled here)
   • window.onSettingsChange(config)  — any settings toggle / clear-session

   ▲▲▲ Override any of these by reassigning window.<fn> ▲▲▲
   ============================================================ */

const SERVICES = [
  { id: 'chatgpt', name: 'ChatGPT', accent: 'var(--c-chatgpt)', meta: 'chat.openai.com' },
  { id: 'gemini',  name: 'Gemini',  accent: 'var(--c-gemini)',  meta: 'gemini.google.com' },
  { id: 'grok',    name: 'Grok',    accent: 'var(--c-grok)',    meta: 'grok.com' },
  { id: 'claude',  name: 'Claude',  accent: 'var(--c-claude)',  meta: 'claude.ai' },
];

/* ---- icon markup ---- */
const ICON = {
  reload: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>',
  expand: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>',
  collapse: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></svg>',
};

/* ---- build the four panes (all mounted, always) ---- */
const grid = document.getElementById('grid');
SERVICES.forEach(s => {
  const pane = document.createElement('section');
  pane.className = 'pane';
  pane.dataset.pane = s.id;
  pane.style.setProperty('--accent', s.accent);
  pane.innerHTML = `
    <div class="pane-head">
      <span class="pane-name"><span class="swatch"></span>${s.name}</span>
      <span class="status" data-status-for="${s.id}" data-status="idle" title="idle"></span>
      <span class="status-label" data-status-label="${s.id}">idle</span>
      <span class="pane-actions">
        <button class="iconbtn" data-act="reload" title="Reload ${s.name}" aria-label="Reload ${s.name}">${ICON.reload}</button>
        <button class="iconbtn" data-act="expand" title="Expand ${s.name}" aria-label="Expand ${s.name}">${ICON.expand}</button>
      </span>
    </div>
    <!-- INTEGRATION: swap a <webview> into this container -->
    <div class="pane-body" data-pane="${s.id}">
      <div class="placeholder">
        <span class="pg-badge"><span class="swatch"></span>${s.name}</span>
        <span class="pg-title">Live session mounts here</span>
        <code>&lt;webview&gt; → [data-pane="${s.id}"]</code>
      </div>
    </div>`;
  grid.appendChild(pane);

  // reload
  pane.querySelector('[data-act="reload"]').addEventListener('click', () => {
    flashStatus(s.id);
    window.onPaneReload(s.id);
  });
  // expand toggle (pure UI; also notifies host)
  pane.querySelector('[data-act="expand"]').addEventListener('click', () => toggleExpand(s.id));
});

/* ---- build tab switcher (narrow layout) ---- */
const tabsEl = document.getElementById('tabs');
SERVICES.forEach((s, i) => {
  const b = document.createElement('button');
  b.className = 'tab';
  b.role = 'tab';
  b.dataset.tab = s.id;
  b.style.setProperty('--accent', s.accent);
  b.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
  b.innerHTML = `<span class="dot8"></span>${s.name}`;
  b.addEventListener('click', () => setActivePane(s.id));
  tabsEl.appendChild(b);
});

/* ---- build settings rows ---- */
const svcList = document.getElementById('svcList');
const settingsState = {};
SERVICES.forEach(s => {
  settingsState[s.id] = { enabled: true };
  const row = document.createElement('div');
  row.className = 'svc';
  row.style.setProperty('--accent', s.accent);
  row.innerHTML = `
    <span class="swatch"></span>
    <div class="svc-main">
      <div class="svc-name">${s.name}</div>
      <div class="svc-meta">${s.meta}</div>
    </div>
    <button class="clear" data-clear="${s.id}">Clear session</button>
    <label class="switch">
      <input type="checkbox" data-enable="${s.id}" checked />
      <span class="track"></span><span class="knob"></span>
    </label>`;
  svcList.appendChild(row);

  row.querySelector('[data-enable]').addEventListener('change', e => {
    settingsState[s.id].enabled = e.target.checked;
    window.onSettingsChange({ type: 'enabled', service: s.id, value: e.target.checked, all: snapshot() });
  });
  row.querySelector('[data-clear]').addEventListener('click', () => {
    window.onSettingsChange({ type: 'clearSession', service: s.id, all: snapshot() });
    flashStatus(s.id);
  });
});
function snapshot() { return JSON.parse(JSON.stringify(settingsState)); }

/* ===================== STATE: active / expanded ===================== */
function setActivePane(id) {
  grid.dataset.active = id;
  tabsEl.querySelectorAll('.tab').forEach(t =>
    t.setAttribute('aria-selected', String(t.dataset.tab === id)));
}

function toggleExpand(id) {
  const expanding = grid.dataset.expanded !== id;
  if (expanding) grid.dataset.expanded = id; else grid.removeAttribute('data-expanded');
  // swap icons
  document.querySelectorAll('.pane').forEach(p => {
    const btn = p.querySelector('[data-act="expand"]');
    const isThis = p.dataset.pane === id && expanding;
    btn.innerHTML = isThis ? ICON.collapse : ICON.expand;
    btn.title = isThis ? `Collapse ${p.dataset.pane}` : `Expand ${p.dataset.pane}`;
  });
  window.onPaneExpand(id, expanding);
}

/* ===================== STATUS DOTS ===================== */
// INTEGRATION: window.setPaneStatus(paneId, status)
window.setPaneStatus = function (paneId, status) {
  const valid = ['idle', 'sending', 'loaded', 'error'];
  if (!valid.includes(status)) { console.warn('setPaneStatus: bad status', status); return; }
  const dot = document.querySelector(`[data-status-for="${paneId}"]`);
  const lbl = document.querySelector(`[data-status-label="${paneId}"]`);
  if (dot) { dot.dataset.status = status; dot.title = status; }
  if (lbl) lbl.textContent = status;
};
// brief visual nudge on reload/clear so the action reads
function flashStatus(id) {
  window.setPaneStatus(id, 'sending');
}

/* ===================== PROMPT COMPOSER ===================== */
const promptEl   = document.getElementById('prompt');
const sendBtn    = document.getElementById('send');
const composerEl = document.getElementById('composer');

function autosize() {
  promptEl.style.height = 'auto';
  promptEl.style.height = Math.min(promptEl.scrollHeight, 180) + 'px';
}
function refreshSend() {
  sendBtn.disabled = promptEl.value.trim().length === 0;
}
promptEl.addEventListener('input', () => { autosize(); refreshSend(); });
promptEl.addEventListener('focus', () => composerEl.classList.add('focused'));
promptEl.addEventListener('blur',  () => composerEl.classList.remove('focused'));

promptEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitPrompt();
  }
});
sendBtn.addEventListener('click', submitPrompt);

function submitPrompt() {
  const text = promptEl.value.trim();
  if (!text) return;

  // drive every enabled pane to "sending" as the confirmation affordance
  SERVICES.forEach(s => { if (settingsState[s.id].enabled) window.setPaneStatus(s.id, 'sending'); });

  window.onPromptSubmit(text);

  // clear + flash confirmation
  promptEl.value = '';
  autosize(); refreshSend();
  composerEl.classList.add('flash');
  setTimeout(() => composerEl.classList.remove('flash'), 450);
  promptEl.focus();
}

/* ===================== SETTINGS DRAWER ===================== */
const scrim = document.getElementById('scrim');
const drawer = document.getElementById('drawer');
function openDrawer(open) {
  scrim.classList.toggle('open', open);
  drawer.classList.toggle('open', open);
  drawer.setAttribute('aria-hidden', String(!open));
}
document.getElementById('gear').addEventListener('click', () => openDrawer(true));
document.getElementById('drawerClose').addEventListener('click', () => openDrawer(false));
scrim.addEventListener('click', () => openDrawer(false));
document.addEventListener('keydown', e => { if (e.key === 'Escape') openDrawer(false); });

/* ===================== DEFAULT STUB HOOKS ===================== */
// Reassign any of these from the Electron preload/renderer to wire real logic.
window.onPromptSubmit = window.onPromptSubmit || function (text) {
  console.log('[onPromptSubmit]', text);
};
window.onPaneReload = window.onPaneReload || function (paneId) {
  console.log('[onPaneReload]', paneId);
};
window.onPaneExpand = window.onPaneExpand || function (paneId, expanded) {
  console.log('[onPaneExpand]', paneId, expanded);
};
window.onSettingsChange = window.onSettingsChange || function (config) {
  console.log('[onSettingsChange]', config);
};

/* initial sizing */
autosize(); refreshSend();
</script>
